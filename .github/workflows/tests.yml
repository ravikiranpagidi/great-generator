name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Test
        run: pytest

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Build wheel and source distribution
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Smoke test installed wheel
        shell: bash
        run: |
          python -m venv /tmp/great-generator-smoke
          source /tmp/great-generator-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          from great_generator import generate_domain, list_domains

          assert "ecommerce" in list_domains()
          data = generate_domain("ecommerce", scale="tiny", seed=42)
          assert set(data) >= {"customers", "orders", "order_items"}
          assert len(data["customers"]) == 25
          PY
